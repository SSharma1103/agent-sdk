version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-tooling:
        patterns:
          - eslint
          - "@eslint/*"
          - typescript-eslint
          - prettier
          - vite
          - "@vitejs/*"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
