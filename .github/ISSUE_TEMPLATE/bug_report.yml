name: Bug report
description: Report a reproducible bug in Agent SDK.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Agent SDK. Please include enough detail for a maintainer to reproduce the issue.
  - type: input
    id: version
    attributes:
      label: SDK version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.18.0"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include code, configuration, and commands needed to reproduce.
      render: ts
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Provider, transport, storage adapter, logs, or screenshots.
